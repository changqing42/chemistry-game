<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>结构图纸室 · 化工厂质检系统</title>

<script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire_1-y/three.js/r128/three.min.js"></script>
<script>
  if(typeof THREE === 'undefined') {
    var script = document.createElement('script');
    script.src = 'https://registry.npmmirror.com/three/0.128.0/files/build/three.min.js';
    document.head.appendChild(script);
  }
</script>

<link href="https://fonts.loli.net/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:       #07090f;
  --panel:    #0c1120;
  --card:     #111927;
  --border:   #1a3050;
  --brite:    #1e5080;
  --blue:     #0af;
  --cyan:     #0ef;
  --green:    #0fa;
  --orange:   #f90;
  --red:      #f44;
  --yellow:   #fd0;
  --purple:   #a06fff;
  --txt:      #d8eeff;
  --txt2:     #6a99c0;
  --txt3:     #2a4f70;
  /* 增加了国内系统字体的后备方案，防止字体加载阻塞页面 */
  --mono:     'Rajdhani', Consolas, monospace;
  --body:     'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
/* 使用 100dvh 适配移动端浏览器动态地址栏高度 */
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--body);}

/* ═══ HEADER ═══ */
#hdr{
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;background:var(--panel);
  border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10;
}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.hdr-l{display:flex;align-items:center;gap:14px;}
.hdr-icon{width:34px;height:34px;border-radius:8px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  display:flex;align-items:center;justify-content:center;font-size:17px;}
.hdr-title{font-family:var(--mono);font-size:18px;color:var(--cyan);letter-spacing:3px;font-weight:600;}
.hdr-sub{font-size:13px;color:var(--txt2);}
.hdr-r{display:flex;gap:24px;align-items:center;}
.hdr-stat{text-align:center;}
.hdr-stat .lbl{font-size:11px;color:var(--txt3);font-family:var(--mono);letter-spacing:1px;}
.hdr-stat .val{font-size:16px;color:var(--cyan);font-family:var(--mono);font-weight:700;}

/* ═══ MODE BANNER ═══ */
#mode-screen{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:32px;
}
.mode-title{font-family:var(--mono);font-size:36px;color:var(--cyan);letter-spacing:6px;font-weight:700;text-align:center;}
.mode-sub{font-size:16px;color:var(--txt2);text-align:center;}
.mode-cards{display:flex;gap:32px;}
.mode-card{
  width:240px;padding:32px 24px;border-radius:14px;
  border:2px solid var(--border);background:var(--panel);
  cursor:pointer;transition:all .3s;text-align:center;
}
.mode-card:hover{border-color:var(--blue);box-shadow:0 0 30px rgba(0,170,255,.2);transform:translateY(-4px);}
.mode-card.locked{opacity:.45;cursor:not-allowed;}
.mode-card.locked:hover{transform:none;box-shadow:none;border-color:var(--border);}
.mode-card .mc-icon{font-size:40px;margin-bottom:12px;}
.mode-card .mc-name{font-family:var(--mono);font-size:22px;color:var(--cyan);font-weight:700;margin-bottom:8px;}
.mode-card .mc-desc{font-size:14px;color:var(--txt2);line-height:1.6;}
.mode-card .mc-tag{
  display:inline-block;margin-top:14px;padding:4px 14px;border-radius:20px;
  font-size:13px;font-family:var(--mono);
}
.mode-card.locked .mc-tag{background:rgba(255,255,255,.05);color:var(--txt3);}
.mode-card:not(.locked) .mc-tag{background:rgba(0,170,255,.12);color:var(--blue);}

/* ═══ MAIN LAYOUT ═══ */
#app{display:flex;flex:1;height:calc(100vh - 52px);height:calc(100dvh - 52px);overflow:hidden;}

/* ═══ LEFT SIDEBAR — CARD LIST ═══ */
#sidebar{
  width:240px;flex-shrink:0;background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-hdr{padding:14px 16px;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:14px;color:var(--txt2);letter-spacing:2px;}
#card-list{flex:1;overflow-y:auto;padding:10px 8px;}
#card-list::-webkit-scrollbar{width:3px;height:3px;}
#card-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.mol-card{
  border-radius:10px;border:1px solid var(--border);
  background:var(--card);margin-bottom:6px;
  cursor:pointer;transition:all .25s;overflow:hidden;
  position:relative;
}
.mol-card:hover{border-color:var(--brite);}
.mol-card.active{border-color:var(--blue);box-shadow:0 0 16px rgba(0,170,255,.15);}
.mol-card.done{border-color:var(--green);}

.card-half{
  padding:12px 14px;display:flex;align-items:center;gap:10px;
}
.card-preview{
  width:54px;height:44px;border-radius:8px;
  background:rgba(0,170,255,.06);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
  font-family:var(--mono);font-weight:700;
  text-align:center;line-height:1.1;padding:0 2px;
}
.card-info{flex:1;min-width:0;}
.card-name{font-size:15px;color:var(--txt);font-weight:500;}
.card-formula{font-size:13px;color:var(--txt2);font-family:var(--mono);margin-top:2px;}
.card-done-mark{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;border-radius:50%;
  background:rgba(0,255,170,.1);border:1px solid var(--green);
  color:var(--green);font-size:11px;display:flex;align-items:center;justify-content:center;
}
.card-expand{
  max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);
  border-top:0px solid var(--border);
}
.mol-card.active .card-expand{max-height:80px;border-top:1px solid var(--border);}
.card-expand-inner{padding:10px 14px;}
.card-type{font-size:12px;color:var(--txt2);}
.card-progress{
  margin-top:6px;height:4px;border-radius:2px;background:rgba(255,255,255,.05);overflow:hidden;
}
.card-progress-fill{height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .4s;}

/* ═══ CENTER — 3D VIEWER ═══ */
#viewer{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  position:relative;background:var(--bg);
}
#viewer-top{
  padding:12px 18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0;background:var(--panel);
}
#mol-name-display{font-family:var(--mono);font-size:22px;color:var(--cyan);font-weight:600;letter-spacing:2px;}
#mol-formula-display{font-size:15px;color:var(--txt2);margin-top:2px;}
.view-btns{display:flex;gap:8px;}
.vbtn{
  padding:6px 14px;border-radius:5px;border:1px solid var(--border);
  background:transparent;color:var(--txt2);font-size:13px;cursor:pointer;
  transition:all .2s;
}
.vbtn:hover{border-color:var(--blue);color:var(--blue);background:rgba(0,170,255,.06);}

#canvas-wrap{flex:1;position:relative;overflow:hidden;}
#mol-canvas{width:100%;height:100%;display:block;cursor:grab;touch-action:none;}
#mol-canvas:active{cursor:grabbing;}

#drag-tip{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(7,9,15,.75);border:1px solid var(--border);
  padding:5px 14px;border-radius:20px;font-size:13px;color:var(--txt3);
  pointer-events:none;transition:opacity .6s;font-family:var(--mono);
}

/* 选中提示 */
#select-hint{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,170,255,.12);border:1px solid var(--blue);
  padding:6px 18px;border-radius:20px;
  font-size:14px;color:var(--blue);pointer-events:none;
  opacity:0;transition:opacity .3s;font-family:var(--mono);letter-spacing:1px;
}
#select-hint.show{opacity:1;}

/* ═══ RIGHT — QUESTION PANEL ═══ */
#qpanel{
  width:420px; 
  flex-shrink:0;background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.qp-hdr{
  padding:14px 16px;border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:14px;color:var(--txt2);letter-spacing:2px;
  display:flex;justify-content:space-between;align-items:center;
}
.qp-body{flex:1;overflow-y:auto;padding:14px;}
.qp-body::-webkit-scrollbar{width:3px;}
.qp-body::-webkit-scrollbar-thumb{background:var(--border);}

/* 欢迎提示 */
#q-welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;text-align:center;
}
#q-welcome .w-icon{font-size:48px;}
#q-welcome p{font-size:15px;color:var(--txt2);line-height:1.7;}

/* 错误时的震动动画 */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
}
.shake { animation: shake 0.4s; }

/* 题目卡片 */
.q-card{
  border-radius:10px;border:1px solid var(--border);
  background:var(--card);margin-bottom:12px;overflow:hidden;
  transition:border-color .25s;
}
.q-card.active-q{border-color:var(--blue);}
.q-card.correct-q{border-color:var(--green);}

.q-card-head{
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;
}
.q-num{
  width:24px;height:24px;border-radius:5px;flex-shrink:0;
  background:rgba(0,170,255,.12);border:1px solid var(--blue);
  color:var(--blue);font-size:13px;font-family:var(--mono);
  display:flex;align-items:center;justify-content:center;font-weight:700;
  margin-top:1px;
}
.q-type-badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-family:var(--mono);margin-bottom:5px;
}
.q-type-badge.prop{background:rgba(255,153,0,.1);color:var(--orange);}
.q-type-badge.fg{background:rgba(160,111,255,.1);color:var(--purple);}
.q-text{font-size:15px;color:var(--txt);line-height:1.6;}

.q-card-body{padding:12px 14px;}
.q-instruction{
  font-size:13px;color:var(--blue);font-family:var(--mono);
  margin-bottom:10px;padding:6px 10px;
  background:rgba(0,170,255,.06);border-radius:5px;
  border-left:2px solid var(--blue);
}

/* 当前选中显示 */
.q-selection-display{
  min-height:38px;border:1px solid var(--border);border-radius:6px;
  padding:6px 10px;background:rgba(0,0,0,.2);
  font-size:13px;color:var(--txt2);font-family:var(--mono);
  margin-bottom:10px;transition:border-color .2s;
}
.q-selection-display.has-sel{border-color:var(--blue);color:var(--cyan);}
.sel-tag{
  display:inline-block;margin:2px;padding:2px 8px;border-radius:4px;
  font-size:12px;background:rgba(0,170,255,.12);color:var(--cyan);
  border:1px solid rgba(0,170,255,.3);
}

/* 确认按钮 */
.confirm-btn{
  width:100%;padding:10px;border-radius:7px;
  border:1px solid var(--blue);background:rgba(0,170,255,.08);
  color:var(--cyan);font-family:var(--mono);font-size:15px;
  letter-spacing:2px;cursor:pointer;transition:all .25s;
  font-weight:600;
}
.confirm-btn:hover:not(:disabled){
  background:rgba(0,170,255,.2);box-shadow:0 0 18px rgba(0,170,255,.25);
}
.confirm-btn:disabled{opacity:.35;cursor:not-allowed;}

/* 结果反馈 */
.q-result{
  margin-top:10px;padding:10px 12px;border-radius:7px;
  font-size:14px;line-height:1.65;display:none;
}
.q-result.show{display:block;}
.q-result.ok{background:rgba(0,255,170,.06);border:1px solid var(--green);color:#8fffd4;}
.q-result.bad{background:rgba(255,68,68,.06);border:1px solid var(--red);color:#ffaaaa;}

/* 完成所有题目 */
.q-all-done{
  margin-top:16px;padding:14px;border-radius:10px;
  background:rgba(0,255,170,.05);border:1px solid var(--green);
  text-align:center;display:none;
}
.q-all-done.show{display:block;}
.q-all-done .done-icon{font-size:32px;margin-bottom:8px;}
.q-all-done p{font-size:15px;color:var(--green);font-family:var(--mono);font-weight:600;}
.q-all-done .done-sub{font-size:13px;color:var(--txt2);margin-top:4px;}
.stamp-btn{
  margin-top:12px;width:100%;padding:10px;
  border-radius:7px;border:1px solid var(--green);
  background:rgba(0,255,170,.1);color:var(--green);
  font-family:var(--mono);font-size:15px;letter-spacing:2px;
  cursor:pointer;transition:all .25s;font-weight:600;
}
.stamp-btn:hover{background:rgba(0,255,170,.2);box-shadow:0 0 18px rgba(0,255,170,.2);}

/* 苯-仅结构提示 */
.benzene-note{
  padding:14px;border-radius:10px;
  background:rgba(160,111,255,.06);border:1px solid var(--purple);
  font-size:14px;color:#c8aaff;line-height:1.7;
}

/* ═══ OVERLAY: 胜利 / 模式选择返回 ═══ */
#victory{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(7,9,15,.95);
  flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#victory.show{display:flex;}
#victory h1{font-family:var(--mono);font-size:32px;color:var(--cyan);letter-spacing:5px;
  animation:glow 2s infinite;text-align:center;}
@keyframes glow{0%,100%{text-shadow:0 0 20px var(--cyan);}50%{text-shadow:0 0 50px var(--cyan),0 0 90px var(--blue);}}
#victory p{font-size:16px;color:var(--txt2);text-align:center;}
.v-btns{display:flex;gap:16px;margin-top:8px;}
.v-btn{padding:12px 28px;border-radius:8px;font-family:var(--mono);font-size:15px;
  letter-spacing:2px;cursor:pointer;transition:all .25s;border:1px solid;}
.v-btn.green{border-color:var(--green);background:rgba(0,255,170,.1);color:var(--green);}
.v-btn.green:hover{background:rgba(0,255,170,.22);box-shadow:0 0 20px rgba(0,255,170,.2);}
.v-btn.blue{border-color:var(--blue);background:rgba(0,170,255,.1);color:var(--blue);}
.v-btn.blue:hover{background:rgba(0,170,255,.22);}

/* 扫描线 */
.scan{position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,170,255,.012) 4px);
  animation:scanmove 6s linear infinite;}
@keyframes scanmove{from{background-position:0 0;}to{background-position:0 80px;}}

/* ═══════════════════════════════════════════════════════
   全新增补：移动端自适应响应式布局 (竖屏游玩支持)
   ═══════════════════════════════════════════════════════ */
@media (max-width: 850px) {
  /* 主容器改为竖向排列 */
  #app { flex-direction: column; }
  
  /* 左侧列表移到上方变成横向滑动的卡片列 */
  #sidebar { width: 100%; height: 110px; flex-direction: row; border-right: none; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sb-hdr { display: none; } /* 隐藏侧边栏标题节省高度 */
  #card-list { display: flex; flex-direction: row; padding: 10px; gap: 10px; overflow-x: auto; overflow-y: hidden; white-space: nowrap; }
  .mol-card { width: 160px; flex-shrink: 0; margin-bottom: 0; display: inline-block;}
  .card-expand { display: none !important; } /* 移动端隐藏底部进度条节省空间 */
  
  /* 右侧答题卡移到底部 */
  #qpanel { width: 100%; flex: 1; border-left: none; border-top: 1px solid var(--border); max-height: 45%; }
  
  /* 中间3D视图占用剩余空间 */
  #viewer { flex: 1; min-height: 35%; }
  
  /* 主菜单自适应 */
  .mode-cards { flex-direction: column; align-items: center; }
  .mode-card { width: 90%; max-width: 320px; }
  
  /* 顶部状态栏压缩 */
  #hdr { padding: 0 12px; }
  .hdr-r { gap: 12px; }
  .hdr-title { font-size: 16px; letter-spacing: 1px; }
  .hdr-sub { display: none; }
  #mol-name-display { font-size: 18px; }
}
</style>
</head>
<body>

<div id="mode-screen">
  <div class="mode-title">🏭 结构图纸室</div>
  <div class="mode-sub">化工厂质检系统 · 微观结构分析终端 · 水平2</div>
  <div class="mode-cards">
    <div class="mode-card" onclick="startGame('beginner')">
      <div class="mc-icon">🔬</div>
      <div class="mc-name">入门模式</div>
      <div class="mc-desc">甲烷·乙烯·乙炔·苯<br>乙醇·乙醛·乙酸·乙酸乙酯<br>8种基础有机物</div>
      <span class="mc-tag">点击开始</span>
    </div>
    <div class="mode-card locked">
      <div class="mc-icon">⚗️</div>
      <div class="mc-name">高手模式</div>
      <div class="mc-desc">更复杂的有机物结构<br>多官能团·同分异构体<br>综合推断挑战</div>
      <span class="mc-tag">🔒 即将开放</span>
    </div>
  </div>
</div>

<div id="hdr" style="display:none">
  <div class="hdr-l">
    <div class="hdr-icon">🔬</div>
    <div>
      <div class="hdr-title">结构图纸室</div>
      <div class="hdr-sub">化工厂质检系统 · 微观结构分析</div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="hdr-stat"><div class="lbl">当前物质</div><div class="val" id="h-cur">—</div></div>
    <div class="hdr-stat"><div class="lbl">已完成</div><div class="val" id="h-done">0/8</div></div>
    <div class="hdr-stat"><div class="lbl">得分</div><div class="val" id="h-score">0</div></div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sb-hdr">📋 需求单队列</div>
    <div id="card-list"></div>
  </div>

  <div id="viewer">
    <div class="scan"></div>
    <div id="viewer-top">
      <div>
        <div id="mol-name-display">请从左侧选择物质</div>
        <div id="mol-formula-display"></div>
      </div>
      <div class="view-btns">
        <button class="vbtn" onclick="resetCurrentQ()">↺ 重置当前</button>
        <button class="vbtn" onclick="backToMenu()">🔙 返回菜单</button>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="mol-canvas"></canvas>
      <div id="drag-tip">🖱 拖动旋转 · 滚轮/双指缩放</div>
      <div id="select-hint">点击原子或键进行选择</div>
    </div>
  </div>

  <div id="qpanel">
    <div class="qp-hdr">
      <span>📐 分子结构图纸</span>
      <span id="q-progress" style="font-size:12px;color:var(--txt3)"></span>
    </div>
    <div class="qp-body" id="qbody">
      <div id="q-welcome">
        <div class="w-icon">📋</div>
        <p>从左侧选择需求单中的物质<br>开始分析微观结构<br>填写结构图纸</p>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 分子数据库（纯净无提示版，逻辑判定已重构）
// ═══════════════════════════════════════════════════════
const MOLS = {
  methane:{
    name:'甲烷', formula:'CH₄', icon:'CH₄', type:'烷烃',
    atoms:[

let renderer, scene, camera, molGroup;
let isDrag=false, prevM={x:0,y:0}, rotX=0.3, rotY=0;
let prevPinchDist=0; // 用于记录双指缩放时的初始距离
let currentMolKey=null;

// 可点击对象注册表
let clickableAtoms=[]; 
let clickableBonds=[]; 

// 当前选中
let selectedAtoms=new Set();   
let selectedBonds=new Set();   

let bondMeshMap={}; 
let atomMeshMap={}; 

// 题目状态
let currentQ=null; 
let qState={}; 

function initThree(){
  const canvas=document.getElementById('mol-canvas');
  const wrap=document.getElementById('canvas-wrap');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x000000,0);
  resizeR();

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(38,wrap.clientWidth/wrap.clientHeight,0.1,200);
  camera.position.set(0,0,13);

  const al=new THREE.AmbientLight(0xffffff,0.5); scene.add(al);
  const dl=new THREE.DirectionalLight(0xffffff,0.9); dl.position.set(5,8,6); scene.add(dl);
  const dl2=new THREE.DirectionalLight(0x3366ff,0.35); dl2.position.set(-4,-3,-5); scene.add(dl2);

  molGroup=new THREE.Group(); scene.add(molGroup);

  // 增加移动端触摸与双指缩放支持
  canvas.addEventListener('mousedown',e=>{isDrag=true;prevM={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',()=>isDrag=false);
  window.addEventListener('mousemove',e=>{
    if(!isDrag)return;
    rotY+=(e.clientX-prevM.x)*0.009; rotX+=(e.clientY-prevM.y)*0.009;
    prevM={x:e.clientX,y:e.clientY};
  });
  
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===1){
      isDrag=true; prevM={x:e.touches[0].clientX, y:e.touches[0].clientY};
    } else if (e.touches.length === 2) {
      isDrag = false; // 进入缩放模式，取消单指旋转
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      prevPinchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, {passive:true});
  
  canvas.addEventListener('touchend',()=>{
    isDrag=false;
    prevPinchDist=0;
  });
  
  canvas.addEventListener('touchmove',e=>{
    if(isDrag && e.touches.length===1){
      rotY+=(e.touches[0].clientX-prevM.x)*0.009; rotX+=(e.touches[0].clientY-prevM.y)*0.009;
      prevM={x:e.touches[0].clientX, y:e.touches[0].clientY};
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (prevPinchDist > 0) {
        // 计算距离变化差值。放大（间距变大）则镜头拉近（Z轴减小），反之则推远
        const delta = prevPinchDist - dist; 
        camera.position.z = Math.max(5, Math.min(22, camera.position.z + delta * 0.05));
      }
      prevPinchDist = dist;
    }
  }, {passive:true});

  canvas.addEventListener('wheel',e=>{
    camera.position.z=Math.max(5,Math.min(22,camera.position.z+e.deltaY*0.018));
  },{passive:true});

  canvas.addEventListener('click',onCanvasClick);
  window.addEventListener('resize',()=>{resizeR();});
  requestAnimationFrame(loop);
}

function resizeR(){
  const w=document.getElementById('canvas-wrap');
  if(!w) return;
  renderer.setSize(w.clientWidth,w.clientHeight,false);
  if(camera){camera.aspect=w.clientWidth/w.clientHeight;camera.updateProjectionMatrix();}
}

function loop(){
  requestAnimationFrame(loop);
  if(molGroup){
    molGroup.rotation.x=rotX;
    molGroup.rotation.y=rotY;
  }
  renderer.render(scene,camera);
}

// ── 材质重置与管理 ──
function resetAllMeshColors() {
  clickableAtoms.forEach(a => {
    a.mesh.material.emissive.setHex(0x000000);
    a.mesh.material.emissiveIntensity = 0;
    a.mesh.scale.setScalar(1.0);
  });
  clickableBonds.forEach(b => {
    if(b.mesh.material.transparent && b.mesh.material.opacity === 0) return;
    b.mesh.material.emissive.setHex(0x000000);
    b.mesh.material.emissiveIntensity = 0;
    b.mesh.scale.setScalar(1.0);
  });
}

// ── 构建分子 ──
let globalBondLines=[]; 

function buildMolecule(key){
  while(molGroup.children.length) molGroup.remove(molGroup.children[0]);
  clickableAtoms=[]; clickableBonds=[];
  bondMeshMap={}; atomMeshMap={};
  globalBondLines=[];

  const mol=MOLS[key];
  if(!mol)return;

  let cx=0,cy=0,cz=0;
  mol.atoms.forEach(a=>{cx+=a.p[0];cy+=a.p[1];cz+=a.p[2];});
  cx/=mol.atoms.length;cy/=mol.atoms.length;cz/=mol.atoms.length;

  mol.bonds.forEach((b,bi)=>{
    const cnt=b.tp==='triple'?3:b.tp==='double'?2:1;
    for(let si=0;si<cnt;si++){
      globalBondLines.push({mainBondIdx:bi,subIdx:si,fromAtom:b.f,toAtom:b.t,type:b.tp});
    }
  });

  mol.atoms.forEach((a,ai)=>{
    const r=a.r*0.46;
    const geo=new THREE.SphereGeometry(r,28,28);
    const mat=new THREE.MeshPhongMaterial({color:a.c, shininess:90, specular:0x333333});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(a.p[0]-cx,a.p[1]-cy,a.p[2]-cz);
    mesh.userData={type:'atom',atomIdx:ai};
    molGroup.add(mesh);
    clickableAtoms.push({mesh,atomIdx:ai});
    atomMeshMap[ai]=mesh;
  });

  globalBondLines.forEach((line,gbi)=>{
    const p1=new THREE.Vector3(mol.atoms[line.fromAtom].p[0]-cx,mol.atoms[line.fromAtom].p[1]-cy,mol.atoms[line.fromAtom].p[2]-cz);
    const p2=new THREE.Vector3(mol.atoms[line.toAtom].p[0]-cx,mol.atoms[line.toAtom].p[1]-cy,mol.atoms[line.toAtom].p[2]-cz);
    const meshes=drawBondLine(p1,p2,line.type,line.subIdx,gbi);
    bondMeshMap[gbi]=meshes;
    meshes.forEach(m=>{
      m.userData={type:'bond',globalBondIdx:gbi,mainBondIdx:line.mainBondIdx,subIdx:line.subIdx,bondType:line.type};
      clickableBonds.push({mesh:m,globalBondIdx:gbi,mainBondIdx:line.mainBondIdx});
    });
  });

  if(mol.benzeneRing) addBenzeneCloud();
  resetAllMeshColors();
}

function drawBondLine(p1,p2,type,subIdx,gbi){
  const dir=new THREE.Vector3().subVectors(p2,p1);
  const len=dir.length();
  const mid=new THREE.Vector3().addVectors(p1,p2).multiplyScalar(0.5);
  const perp=new THREE.Vector3(-dir.y,dir.x,0).normalize();

  const colors={single:0x999999,double:0xffcc00,triple:0x22aaff,aromatic:0x88aaff};
  const radii={single:0.075,double:0.058,triple:0.050,aromatic:0.065};
  const offsets={single:0,double:subIdx===0?0.13:-0.13,triple:subIdx===0?0:subIdx===1?0.14:-0.14,aromatic:0};

  const geo=new THREE.CylinderGeometry(radii[type],radii[type],len*0.78,12);
  const mat=new THREE.MeshPhongMaterial({color:colors[type],shininess:60});
  const mesh=new THREE.Mesh(geo,mat);

  const hitR=0.18;
  const hitGeo=new THREE.CylinderGeometry(hitR,hitR,len*0.85,8);
  const hitMat=new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false});
  const hitMesh=new THREE.Mesh(hitGeo,hitMat);

  const offsetVec=perp.clone().multiplyScalar(offsets[type]);
  [mesh,hitMesh].forEach(m=>{
    m.position.copy(mid).add(offsetVec);
    const ax=new THREE.Vector3(0,1,0);
    m.quaternion.setFromUnitVectors(ax,dir.clone().normalize());
  });

  molGroup.add(mesh);
  molGroup.add(hitMesh);
  hitMesh.userData={type:'bond',globalBondIdx:gbi,mainBondIdx:gbi,subIdx,bondType:type};
  clickableBonds.push({mesh:hitMesh,globalBondIdx:gbi,mainBondIdx:gbi});
  return [mesh,hitMesh];
}

function addBenzeneCloud(){
  const torus=new THREE.TorusGeometry(1.4,0.12,8,40);
  const mat=new THREE.MeshPhongMaterial({color:0x4466ff,transparent:true,opacity:0.2,side:THREE.DoubleSide});
  const ring=new THREE.Mesh(torus,mat);
  ring.rotation.x=Math.PI/2;
  molGroup.add(ring);
}

// ── 点击检测 ──
const raycaster=new THREE.Raycaster();
const mouse2d=new THREE.Vector2();

function onCanvasClick(e){
  if(!currentMolKey||!currentQ)return;
  const rect=renderer.domElement.getBoundingClientRect();
  
  // 兼容触摸点击
  let clientX = e.clientX;
  let clientY = e.clientY;
  if(e.changedTouches && e.changedTouches.length > 0) {
      clientX = e.changedTouches[0].clientX;
      clientY = e.changedTouches[0].clientY;
  }
  
  mouse2d.x=((clientX-rect.left)/rect.width)*2-1;
  mouse2d.y=-((clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse2d,camera);

  const allMeshes=[
    ...clickableAtoms.map(x=>x.mesh),
    ...clickableBonds.map(x=>x.mesh)
  ];
  const hits=raycaster.intersectObjects(allMeshes);
  if(!hits.length)return;

  const obj=hits[0].object;
  const ud=obj.userData;
  
  const resDiv = document.getElementById(`qresult-${currentQ.qIdx}`);
  if(resDiv) { resDiv.className='q-result'; resDiv.innerHTML=''; }

  if(ud.type==='atom') handleAtomClick(ud.atomIdx);
  else if(ud.type==='bond') handleBondClick(ud.globalBondIdx,ud.mainBondIdx);
}

function handleAtomClick(atomIdx){
  const q=getCurrentQ();
  if(!q||q.done)return;
  if(q.mode==='bond')return; 

  if(selectedAtoms.has(atomIdx)){
    selectedAtoms.delete(atomIdx);
    setAtomHighlight(atomIdx,false);
  } else {
    selectedAtoms.add(atomIdx);
    setAtomHighlight(atomIdx,true);
  }
  updateSelectionDisplay();
}

function handleBondClick(gbi,mainBondIdx){
  const q=getCurrentQ();
  if(!q||q.done)return;

  const key=`b${gbi}`;
  if(selectedBonds.has(key)){
    selectedBonds.delete(key);
    setBondHighlight(gbi,false);
  } else {
    selectedBonds.add(key);
    setBondHighlight(gbi,true);
  }
  updateSelectionDisplay();
}

function setAtomHighlight(atomIdx,on){
  const mesh=atomMeshMap[atomIdx];
  if(!mesh)return;
  if(on){
    mesh.material.emissive.setHex(0x00aaff);
    mesh.material.emissiveIntensity=0.7;
    mesh.scale.setScalar(1.22);
  } else {
    mesh.material.emissive.setHex(0x000000);
    mesh.material.emissiveIntensity=0;
    mesh.scale.setScalar(1.0);
  }
}

function setBondHighlight(gbi,on){
  const meshes=bondMeshMap[gbi];
  if(!meshes)return;
  meshes.forEach(m=>{
    if(m.material.transparent&&m.material.opacity===0)return; 
    if(on){
      m.material.emissive.setHex(0x00ffaa);
      m.material.emissiveIntensity=0.8;
      m.scale.y=1.0; m.scale.x=1.3; m.scale.z=1.3;
    } else {
      m.material.emissive.setHex(0x000000);
      m.material.emissiveIntensity=0;
      m.scale.setScalar(1.0);
    }
  });
}

function clearAllHighlights(){
  selectedAtoms.clear();
  selectedBonds.clear();
}

function resetCurrentQ(){
  if(!currentQ) return;
  clearAllHighlights();
  resetAllMeshColors();
  updateSelectionDisplay();
  const resDiv = document.getElementById(`qresult-${currentQ.qIdx}`);
  if(resDiv) { resDiv.className='q-result'; resDiv.innerHTML=''; }
}

function updateSelectionDisplay(){
  const sel=document.getElementById('sel-display');
  if(!sel)return;
  const mol=MOLS[currentMolKey];
  const parts=[];
  selectedAtoms.forEach(ai=>{
    parts.push(`<span class="sel-tag">${mol.atoms[ai].s}${ai}</span>`);
  });
  
  let processedMainBonds = new Set();
  selectedBonds.forEach(k=>{
    const gbi=parseInt(k.replace('b',''));
    const line=globalBondLines[gbi];
    if(!line)return;
    if(processedMainBonds.has(line.mainBondIdx)) return;
    
    processedMainBonds.add(line.mainBondIdx);
    const fa=mol.atoms[line.fromAtom].s, ta=mol.atoms[line.toAtom].s;
    const sym=line.type==='double'?'=':line.type==='triple'?'≡':'-';
    parts.push(`<span class="sel-tag">${fa}${sym}${ta}</span>`);
  });
  sel.innerHTML=parts.length?parts.join(''):'<span style="opacity:.5">尚未选择</span>';
  sel.className='q-selection-display'+(parts.length?' has-sel':'');

  const btn=document.getElementById('confirm-btn');
  if(btn) btn.disabled=(selectedAtoms.size+selectedBonds.size)===0;
}

let gameOrder=[];
let completedMols={};
let totalScore=0;

function startGame(mode){
  document.getElementById('mode-screen').style.display='none';
  document.getElementById('hdr').style.display='flex';
  document.getElementById('app').style.display='flex';
  gameOrder=BEGINNER_ORDER;
  initThree();
  buildCardList();

function buildCardList(){
  const list=document.getElementById('card-list');
  list.innerHTML='';
  gameOrder.forEach(key=>{
    const mol=MOLS[key];
    const card=document.createElement('div');
    card.className='mol-card'+(completedMols[key]?' done':'');
    card.id='card-'+key;
    const prog=getMolProgress(key);
    card.innerHTML=`
      <div class="card-half">
        <div class="card-preview">${mol.icon||'⬡'}</div>
        <div class="card-info">
          <div class="card-name">${mol.name}</div>
          <div class="card-formula">${mol.formula}</div>
        </div>
        ${completedMols[key]?'<div class="card-done-mark">✓</div>':''}
      </div>
      <div class="card-expand">
        <div class="card-expand-inner">
          <div class="card-type">${mol.type}</div>
          <div class="card-progress">
            <div class="card-progress-fill" style="width:${prog}%"></div>
          </div>
        </div>
      </div>

    card.onclick=()=>selectMol(key);
    list.appendChild(card);

function getMolProgress(key){
  if(completedMols[key])return 100;
  const st=qState[key];
  if(!st)return 0;
  const mol=MOLS[key];
  if(!mol.questions.length)return 0;
  const done=st.answers.filter(a=>a&&a.done).length;
  return Math.round(done/mol.questions.length*100);
}

function selectMol(key){
  currentMolKey=key;
  clearAllHighlights();

  document.querySelectorAll('.mol-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('card-'+key)?.classList.add('active');

  const mol=MOLS[key];
  document.getElementById('mol-name-display').textContent=mol.name;
  document.getElementById('mol-formula-display').textContent=mol.formula+' · '+mol.type;
  document.getElementById('h-cur').textContent=mol.name;

  rotX=0.25;rotY=0;
  buildMolecule(key);
  initQState(key);
  renderQuestions(key);
  updateHeader();

  setTimeout(()=>{
    const h=document.getElementById('drag-tip');
    if(h)h.style.opacity='0';
  },4000);
}

function initQState(key){
  if(qState[key])return;
  const mol=MOLS[key];
  qState[key]={answers:mol.questions.map(()=>({atomSel:new Set(),bondSel:new Set(),done:false,correct:false}))};
}

function renderQuestions(key){
  const mol=MOLS[key];
  const body=document.getElementById('qbody');
  currentQ=null;

  if(key==='benzene'||!mol.questions.length){
    body.innerHTML=`
      <div style="padding:4px">
        <div class="benzene-note">
          <strong style="color:#c8aaff;font-size:16px">🔎 观察苯的结构</strong><br><br>
          苯（C₆H₆）为正六边形平面结构，6个C-C键完全等价，键长1.40Å（介于单键1.54Å和双键1.34Å之间）。<br><br>
          请拖动旋转分子模型，观察苯环的平面性和π电子云（半透明蓝色圆环）。<br><br>
          <span style="color:#a080ff;font-size:13px">📌 本阶段以结构观察为主，后续将补充更多题目。</span>
        </div>
      </div>
    `;
    document.getElementById('q-progress').textContent='';
    return;
  }

  const st=qState[key];
  let activeQIdx=st.answers.findIndex(a=>!a.done);
  if(activeQIdx===-1) activeQIdx=mol.questions.length-1;

  body.innerHTML='';
  const dp=document.getElementById('q-progress');
  const done=st.answers.filter(a=>a.done).length;
  dp.textContent=`${done}/${mol.questions.length}`;

  mol.questions.forEach((q,qi)=>{
    const ans=st.answers[qi];
    const isActive=qi===activeQIdx&&!ans.done;
    const card=document.createElement('div');
    card.className='q-card'+(isActive?' active-q':ans.done?' correct-q':'');
    card.id=`qcard-${qi}`;

    const typeBadge=q.type==='prop'?
      '<span class="q-type-badge prop">性质题</span>':
      '<span class="q-type-badge fg">综合推断</span>';

    let bodyHTML='';
    if(isActive){
      bodyHTML=`
        <div class="q-card-body">
          <div class="q-instruction">${q.instruction}</div>
          <div class="q-selection-display" id="sel-display"><span style="opacity:.5">尚未选择</span></div>
          <button class="confirm-btn" id="confirm-btn" onclick="confirmAnswer(${qi})" disabled>确认选择</button>
          <div class="q-result" id="qresult-${qi}"></div>
        </div>
      `;
      currentQ={molKey:key,qIdx:qi};
      resetAllMeshColors();
      selectedAtoms=new Set(ans.atomSel);
      selectedBonds=new Set(ans.bondSel);
      selectedAtoms.forEach(ai=>setAtomHighlight(ai,true));
      selectedBonds.forEach(k=>{setBondHighlight(parseInt(k.replace('b','')),true);});
    } else if(ans.done){
      bodyHTML=`
        <div class="q-card-body">
          <div class="q-result show ok">
            ✅ ${q.explain}
          </div>
        </div>
      `;
    } else {
      bodyHTML=`<div class="q-card-body" style="padding:8px 14px;font-size:13px;color:var(--txt3)">等待前面题目完成后解锁</div>`;
    }

    card.innerHTML=`
      <div class="q-card-head">
        <div class="q-num">${qi+1}</div>
        <div>
          ${typeBadge}
          <div class="q-text">${q.text}</div>
        </div>
      </div>
      ${bodyHTML}
    `;
    body.appendChild(card);
  });

  const allDone=st.answers.every(a=>a.done);
  const doneDiv=document.createElement('div');
  doneDiv.className='q-all-done'+(allDone?' show':'');
  doneDiv.id='all-done-div';
  doneDiv.innerHTML=`
    <div class="done-icon">📐</div>
    <p>图纸填写完成！</p>
    <div class="done-sub">所有题目已作答，图纸可以下发合成车间。</div>
    <button class="stamp-btn" onclick="stampAndNext('${key}')">盖章下发 →</button>
  `;
  body.appendChild(doneDiv);

  if(activeQIdx!==-1&&!st.answers[activeQIdx]?.done){
    document.getElementById('select-hint').classList.add('show');
    setTimeout(()=>document.getElementById('select-hint').classList.remove('show'),3000);
  }
}

function getCurrentQ(){
  if(!currentQ)return null;
  const mol=MOLS[currentQ.molKey];
  if(!mol)return null;
  return {q:mol.questions[currentQ.qIdx],qi:currentQ.qIdx,...currentQ};
}

function confirmAnswer(qi){
  const key=currentMolKey;
  const mol=MOLS[key];
  const q=mol.questions[qi];
  const st=qState[key];
  const ans=st.answers[qi];

  ans.atomSel=new Set(selectedAtoms);
  ans.bondSel=new Set(selectedBonds);

  const isCorrect = checkAnswer(q, selectedAtoms, selectedBonds);

  if(isCorrect){
    ans.done=true;
    ans.correct=true;
    totalScore++;

    clearAllHighlights();
    resetAllMeshColors();
    currentQ=null;

    highlightCorrectElements(q, true);

    updateHeader();
    buildCardList();

    setTimeout(()=>renderQuestions(key), 600);
  } else {
    const resDiv = document.getElementById(`qresult-${qi}`);
    if(resDiv) {
      resDiv.className = 'q-result show bad';
      resDiv.innerHTML = '❌ 检测到结构不匹配，请重新分析并调整选择。';
    }
    const card = document.getElementById(`qcard-${qi}`);
    if(card) {
      card.classList.remove('shake');
      void card.offsetWidth; 
      card.classList.add('shake');
    }
  }
}

function checkAnswer(q, atomSel, bondSel){
  const mol=MOLS[currentMolKey];

  if(q.mode==='bond'){
    if(q.correct.bondIdx){
      const slots=q.correct.bondIdx;
      let ok=true;
      
      let uniqueSelectedMainBonds = new Set();
      Array.from(bondSel).forEach(k=>{
         const gbi=parseInt(k.replace('b',''));
         uniqueSelectedMainBonds.add(globalBondLines[gbi]?.mainBondIdx);
      });
      if(uniqueSelectedMainBonds.size !== slots.length) return false;

      slots.forEach(slot=>{
        const hit = Array.from(uniqueSelectedMainBonds).some(mainBi => slot.includes(mainBi));
        if(!hit) ok=false;
      });
      return ok;
    }
    if(q.correct.bondTypes){
      let uniqueMainBonds = new Set();
      Array.from(bondSel).forEach(k=>{
         const gbi=parseInt(k.replace('b',''));
         uniqueMainBonds.add(globalBondLines[gbi]?.mainBondIdx);
      });
      if(uniqueMainBonds.size !== q.count) return false;

      return Array.from(uniqueMainBonds).every(mainBi => {
         const line = globalBondLines.find(l => l.mainBondIdx === mainBi);
         if(!line) return false;
         const fa=mol.atoms[line.fromAtom].s, ta=mol.atoms[line.toAtom].s;
         const pair=`${fa}-${ta}`, pairR=`${ta}-${fa}`;
         return q.correct.bondTypes.some(bt=>{
           if(bt==='C-H')return (pair==='C-H'||pairR==='C-H')&&line.type==='single';
           if(bt==='O-H')return (pair==='O-H'||pairR==='O-H')&&line.type==='single';
           if(bt==='C=C')return line.type==='double';
           if(bt==='C≡C')return line.type==='triple';
           return false;
         });
      });
    }
  }

  if(q.mode==='multi'){
    const ca=q.correct.atomIdx||[];
    const cb=q.correct.bondIdx||[];
    
    const atomOk = ca.every(ai=>atomSel.has(ai)) && atomSel.size===ca.length;
    
    const selMainBonds = [...new Set(Array.from(bondSel).map(k=>{
      const gbi=parseInt(k.replace('b',''));
      return globalBondLines[gbi]?.mainBondIdx;
    }).filter(v=>v!==undefined))];

    const bondOk = cb.every(bi=>selMainBonds.includes(bi)) && selMainBonds.length===cb.length;

    return atomOk && bondOk;
  }
  return false;
}

function highlightCorrectElements(q, correct){
  const mol=MOLS[currentMolKey];
  const color=correct?new THREE.Color(0x00ff88):new THREE.Color(0xff4444);

  if(q.mode==='bond'){
    const slots=q.correct.bondIdx||[];
    slots.forEach(slot=>{
      slot.forEach(mainBi=>{
        globalBondLines.forEach((line,gbi)=>{
          if(line.mainBondIdx===mainBi){
            const meshes=bondMeshMap[gbi];
            if(meshes) meshes.forEach(m=>{
              if(m.material.transparent&&m.material.opacity===0)return;
              m.material.emissive.copy(color);
              m.material.emissiveIntensity=0.6;
            });
          }
        });
      });
    });
    if(q.correct.bondTypes){
      globalBondLines.forEach((line,gbi)=>{
        const fa=mol.atoms[line.fromAtom].s,ta=mol.atoms[line.toAtom].s;
        const pair=`${fa}-${ta}`, pairR=`${ta}-${fa}`;
        const match=q.correct.bondTypes.some(bt=>{
          if(bt==='C-H')return (pair==='C-H'||pairR==='C-H')&&line.type==='single';
          if(bt==='O-H')return (pair==='O-H'||pairR==='O-H')&&line.type==='single';
          if(bt==='C=C')return line.type==='double';
          if(bt==='C≡C')return line.type==='triple';
          return false;
        });
        if(match){
          const meshes=bondMeshMap[gbi];
          if(meshes) meshes.forEach(m=>{
            if(m.material.transparent&&m.material.opacity===0)return;
            m.material.emissive.copy(color); 
            m.material.emissiveIntensity=0.5;
          });
        }
      });
    }
  }
  else if(q.mode==='multi'){
    const cb=q.correct.bondIdx||[];
    cb.forEach(mainBi=>{
        globalBondLines.forEach((line,gbi)=>{
          if(line.mainBondIdx===mainBi){
            const meshes=bondMeshMap[gbi];
            if(meshes) meshes.forEach(m=>{
              if(m.material.transparent&&m.material.opacity===0)return;
              m.material.emissive.copy(color);
              m.material.emissiveIntensity=0.6;
            });
          }
        });
    });
  }
}

function stampAndNext(key){
  completedMols[key]=true;
  buildCardList();
  updateHeader();

  const remaining=gameOrder.filter(k=>!completedMols[k]);
  if(remaining.length===0){
    setTimeout(()=>showVictory(),400);
    return;
  }
  const next=remaining[0];
  selectMol(next);
}

function updateHeader(){
  document.getElementById('h-done').textContent=`${Object.keys(completedMols).length}/${gameOrder.length}`;
  document.getElementById('h-score').textContent=totalScore;
}

function showVictory(){
  document.getElementById('v-msg').textContent=`共完成 ${gameOrder.length} 份图纸，答对 ${totalScore} 道题！`;
  document.getElementById('victory').classList.add('show');
}

function restartGame(){
  completedMols={};totalScore=0;qState={};currentMolKey=null;currentQ=null;
  document.getElementById('victory').classList.remove('show');
  buildCardList();updateHeader();
  document.getElementById('qbody').innerHTML=`<div id="q-welcome"><div class="w-icon">📋</div><p>从左侧选择需求单中的物质<br>开始分析微观结构<br>填写结构图纸</p></div>`;
  while(molGroup.children.length)molGroup.remove(molGroup.children[0]);
  document.getElementById('mol-name-display').textContent='请从左侧选择物质';
  document.getElementById('mol-formula-display').textContent='';
}

function backToMenu(){
  document.getElementById('victory').classList.remove('show');
  document.getElementById('hdr').style.display='none';
  document.getElementById('app').style.display='none';
  document.getElementById('mode-screen').style.display='flex';
  restartGame();
}

</script>
</body>
</html>
